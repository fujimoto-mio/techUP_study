<!DOCTYPE HTML>
<html lang="ja">
<head>
<meta charset="UTF-8" />
  <title>JavaScriptBasic</title>
</head>
<body>
  <script>
    var year = 2022;

    switch (year) {
     case 2022:
        console.log('虎');
        break;
     case 2023:
        console.log('兎');
        break;
     case 2024:
        console.log('辰');
        break;
     default:
        console.log('別の干支です。');
        break;
    }
  </script>
</body>
</html>
