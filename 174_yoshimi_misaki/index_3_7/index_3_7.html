<!DOCTYPE HTML>
<html lang="ja">
<head>
<meta charset="UTF-8" />
  <title>JavaScript switch文</title>
</head>
<body>
  <p>JavaScript演習</p>

  <script>
    'use strict';
    
    var year = 2022;

    switch(year) {

        case 2020:
            console.log('子');
            break;

        case 2021:
            console.log('丑');
            break;

        case 2022:
            console.log('寅');
            break;

        default:
            console.log('該当なし');
    }

  </script>
</body>
</html>
