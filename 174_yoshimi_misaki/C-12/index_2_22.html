<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レスポンシブWEBデザイン</title>
    <style>
    body {
      font-size: 15px;
    }

    @media screen and (min-width: 481px) {
      body {
        font-size: 20px;
      }
    }

    @media screen and (min-width: 769px) {
      body {
        font-size: 25px;
      }
    }

    @media screen and (min-width: 1025px) {
      body {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <p>
    画面サイズによって文字サイズが変わる
  </p>
</body>
</html>
